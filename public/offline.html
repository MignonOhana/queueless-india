<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueueLess — Offline</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        .container {
            padding: 2rem;
            max-width: 400px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            tracking: -0.05em;
        }
        p {
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
  <div class="container">
    <h1>🎫 You're offline</h1>
    <p>Check your connection and try again. QueueLess requires an internet connection to manage your tokens.</p>
    <button onclick="location.reload()">Retry Connection</button>
  </div>
</body>
</html>
